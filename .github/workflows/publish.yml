name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release
  id-token: write   # npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm with provenance (Trusted Publishing via OIDC)
        run: npm publish --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  bump-homebrew:
    needs: publish
    if: ${{ !contains(github.ref_name, '-') }}   # skip prereleases
    runs-on: ubuntu-latest
    steps:
      - name: Wait for npm registry to propagate
        run: sleep 30

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          TARBALL_URL="https://registry.npmjs.org/@robotnetworks/robonet/-/robonet-${VERSION}.tgz"
          SHA256=$(curl -sSL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          echo "Version: $VERSION"
          echo "Tarball: $TARBALL_URL"
          echo "sha256:  $SHA256"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/RobotNetworks/homebrew-tap.git" tap
          cd tap

          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/robonet.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/robonet.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/robonet.rb
          git diff --cached --quiet && { echo "No formula changes, skipping commit."; exit 0; }
          git commit -m "robonet ${VERSION}"
          git push
