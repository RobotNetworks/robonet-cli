name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release
  id-token: write   # npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # Trusted Publishing (OIDC-based registry auth) requires npm >= 11.5.1.
      # Node 22 ships with npm 10.x, so upgrade before publishing.
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm with provenance (Trusted Publishing via OIDC)
        run: npm publish --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
