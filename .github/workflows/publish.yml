name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create GitHub Release
  id-token: write   # npm provenance via OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      - name: Publish to npm with provenance (Trusted Publishing via OIDC)
        run: npm publish --provenance

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  bump-homebrew:
    needs: publish
    if: ${{ !contains(github.ref_name, '-') }}   # skip prereleases
    runs-on: ubuntu-latest
    steps:
      - name: Wait for npm registry to propagate
        run: sleep 30

      - name: Update Homebrew tap formula
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${REF_NAME#v}"
          TARBALL_URL="https://registry.npmjs.org/@robotnetworks/robotnet/-/robotnet-${VERSION}.tgz"
          SHA256=$(curl -sSL "$TARBALL_URL" | shasum -a 256 | cut -d' ' -f1)
          echo "Version: $VERSION"
          echo "Tarball: $TARBALL_URL"
          echo "sha256:  $SHA256"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/RobotNetworks/homebrew-tap.git" tap
          cd tap

          sed -i "s|url \".*\"|url \"${TARBALL_URL}\"|" Formula/robotnet.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/robotnet.rb

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/robotnet.rb
          git diff --cached --quiet && { echo "No formula changes, skipping commit."; exit 0; }
          git commit -m "robotnet ${VERSION}"
          git push

  brew-smoke-test:
    needs: bump-homebrew
    if: ${{ !contains(github.ref_name, '-') }}   # skip prereleases (matches bump-homebrew)
    runs-on: macos-latest
    steps:
      - name: Install the freshly-bumped formula
        env:
          # Don't get rate-limited or caught by Homebrew's analytics ping in CI.
          HOMEBREW_NO_ANALYTICS: "1"
          HOMEBREW_NO_AUTO_UPDATE: "0"   # we DO want auto-update so the new tap commit is visible
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
        run: |
          # `brew update` pulls the tap commit `bump-homebrew` just pushed.
          # `brew install --verbose` surfaces `npm rebuild` output if the
          # native build step regresses (the failure mode this whole job
          # exists to catch).
          brew update
          brew install --verbose robotnetworks/tap/robotnet

      - name: Verify the install runs the formula's test block
        env:
          HOMEBREW_NO_ANALYTICS: "1"
        run: |
          # The formula's `test do` block asserts `--version` matches AND
          # runs `robotnet doctor` to exercise the better-sqlite3 binding.
          # If a future Node release ships a NODE_MODULE_VERSION the
          # formula's rebuild step can't compile against, this job fails
          # loudly before the next user hits "Could not locate the
          # bindings file." in the wild.
          brew test robotnetworks/tap/robotnet
